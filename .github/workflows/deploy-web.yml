name: Build and Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install export templates
        run: |
          TPL_DIR="${HOME}/.local/share/godot/export_templates/4.6.2.stable"
          mkdir -p "${TPL_DIR}"
          # Copy templates bundled in the image (installed under /root)
          cp -r /root/.local/share/godot/export_templates/4.6.2.stable/* "${TPL_DIR}/" 2>/dev/null || true
          # Ensure the nothreads web template exists by downloading the full set
          if [ ! -f "${TPL_DIR}/web_nothreads_release.zip" ]; then
            cd /tmp
            wget -q https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz
            unzip -q Godot_v4.6.2-stable_export_templates.tpz
            cp -f templates/* "${TPL_DIR}/"
          fi
          echo "=== templates present ==="
          ls "${TPL_DIR}/" | grep web

      - name: Import project
        run: godot --headless --import || true

      - name: Export Web (HTML5)
        run: |
          mkdir -p ./exports/web
          godot --headless --export-release "Web" ./exports/web/index.html
          ls -la ./exports/web

      - name: Fix ownership for artifact upload
        run: chown -R $(id -u):$(id -g) ./exports/web || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./exports/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
