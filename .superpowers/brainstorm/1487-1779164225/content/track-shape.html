<h2>Phase 1 轨道形状</h2>
<p class="subtitle">玩家沿哪种形状的轨道自动行走？选一个你想要的风格。</p>

<div class="cards">

  <div class="card" data-choice="circle" onclick="toggleSelect(this)">
    <div class="card-image" style="display:flex;align-items:center;justify-content:center;padding:24px;background:#0d1117;">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <!-- Track circle -->
        <circle cx="100" cy="100" r="72" fill="none" stroke="#30363d" stroke-width="18"/>
        <!-- Tiles (12 dots on circle) -->
        <g fill="#58a6ff">
          <circle cx="100" cy="28" r="7"/>
          <circle cx="136" cy="36" r="7"/>
          <circle cx="162" cy="64" r="7"/>
          <circle cx="172" cy="100" r="7"/>
          <circle cx="162" cy="136" r="7"/>
          <circle cx="136" cy="164" r="7"/>
          <circle cx="100" cy="172" r="7"/>
          <circle cx="64" cy="164" r="7"/>
          <circle cx="38" cy="136" r="7"/>
          <circle cx="28" cy="100" r="7"/>
          <circle cx="38" cy="64" r="7"/>
          <circle cx="64" cy="36" r="7"/>
        </g>
        <!-- Player -->
        <circle cx="100" cy="28" r="10" fill="#f0883e" stroke="#fff" stroke-width="2"/>
        <!-- Arrow showing direction -->
        <path d="M120 32 L140 28 L132 42" fill="#f0883e" opacity="0.7"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>A — 正圆形轨道</h3>
      <p>12 个地块均匀分布在圆形轨道上，玩家顺时针自动行走。视觉感最接近 Loop Hero。</p>
    </div>
  </div>

  <div class="card" data-choice="rect" onclick="toggleSelect(this)">
    <div class="card-image" style="display:flex;align-items:center;justify-content:center;padding:24px;background:#0d1117;">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <!-- Track rectangle -->
        <rect x="24" y="40" width="152" height="120" rx="12" fill="none" stroke="#30363d" stroke-width="18"/>
        <!-- Tiles (12 dots on rect perimeter) -->
        <g fill="#58a6ff">
          <!-- Top row -->
          <circle cx="56" cy="40" r="7"/>
          <circle cx="100" cy="40" r="7"/>
          <circle cx="144" cy="40" r="7"/>
          <!-- Right col -->
          <circle cx="176" cy="72" r="7"/>
          <circle cx="176" cy="128" r="7"/>
          <!-- Bottom row -->
          <circle cx="144" cy="160" r="7"/>
          <circle cx="100" cy="160" r="7"/>
          <circle cx="56" cy="160" r="7"/>
          <!-- Left col -->
          <circle cx="24" cy="128" r="7"/>
          <circle cx="24" cy="100" r="7"/>
          <circle cx="24" cy="72" r="7"/>
          <!-- Corner/start -->
          <circle cx="56" cy="40" r="7" fill="#3fb950"/>
        </g>
        <!-- Player -->
        <circle cx="56" cy="40" r="10" fill="#f0883e" stroke="#fff" stroke-width="2"/>
        <!-- Arrow -->
        <path d="M80 36 L96 40 L80 50" fill="#f0883e" opacity="0.7"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>B — 矩形跑道</h3>
      <p>类赛道风格，矩形四边各有地块，拐角处清晰可见。更容易布局 UI（两侧有留白放 HUD）。</p>
    </div>
  </div>

  <div class="card" data-choice="oval" onclick="toggleSelect(this)">
    <div class="card-image" style="display:flex;align-items:center;justify-content:center;padding:24px;background:#0d1117;">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <!-- Track oval (wider than tall) -->
        <ellipse cx="100" cy="100" r="88" ry="56" fill="none" stroke="#30363d" stroke-width="18"/>
        <!-- Tiles (12 dots on ellipse) -->
        <g fill="#58a6ff">
          <circle cx="100" cy="44" r="7"/>
          <circle cx="145" cy="52" r="7"/>
          <circle cx="178" cy="74" r="7"/>
          <circle cx="188" cy="100" r="7"/>
          <circle cx="178" cy="126" r="7"/>
          <circle cx="145" cy="148" r="7"/>
          <circle cx="100" cy="156" r="7"/>
          <circle cx="55" cy="148" r="7"/>
          <circle cx="22" cy="126" r="7"/>
          <circle cx="12" cy="100" r="7"/>
          <circle cx="22" cy="74" r="7"/>
          <circle cx="55" cy="52" r="7"/>
        </g>
        <!-- Player -->
        <circle cx="100" cy="44" r="10" fill="#f0883e" stroke="#fff" stroke-width="2"/>
        <path d="M120 48 L140 44 L132 58" fill="#f0883e" opacity="0.7"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>C — 横向椭圆</h3>
      <p>比正圆更扁，屏幕利用率更高（宽屏友好），两端弯道自然。适合横向布局的游戏窗口。</p>
    </div>
  </div>

</div>

<p class="subtitle" style="margin-top:16px;">目标平台是 HTML5 横屏（宽屏），选完后在终端告诉我。</p>
